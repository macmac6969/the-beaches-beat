name: Deploy site to GitHub Pages

# Deploy pipeline for The Beaches Beat (CUB-2):
# push to main -> this workflow publishes the static site -> live URL. One step.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage static site
        run: |
          mkdir -p _site
          cp index.html _site/
          [ -f CNAME ] && cp CNAME _site/ || true
          touch _site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
