<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Beaches Beat — local news for the Beaches</title>
  <meta name="description" content="The Beaches Beat is a weekly local newsletter for the Beaches community. Subscriptions opening soon." />
  <meta name="robots" content="index,follow" />
  <meta property="og:title" content="The Beaches Beat" />
  <meta property="og:description" content="A weekly local newsletter for the Beaches. Subscriptions opening soon." />
  <meta property="og:type" content="website" />
  <style>
    :root { --sand:#f6f1e7; --ink:#12212b; --sea:#0d7d8c; --sun:#e8963a; }
    * { box-sizing:border-box; }
    html,body { margin:0; padding:0; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:var(--sand); color:var(--ink); line-height:1.5;
      min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:24px; text-align:center;
    }
    .wrap { max-width:560px; }
    .kicker { text-transform:uppercase; letter-spacing:.14em; font-size:.8rem; color:var(--sea); font-weight:700; margin:0 0 12px; }
    h1 { font-size:clamp(2rem,7vw,3.2rem); margin:0 0 16px; line-height:1.05; }
    p.lead { font-size:1.15rem; margin:0 0 28px; color:#33454f; }
    .badge { display:inline-block; background:var(--sun); color:#fff; font-weight:600; font-size:.95rem; padding:10px 18px; border-radius:999px; }
    footer { margin-top:40px; font-size:.8rem; color:#6a7880; }
    a { color:var(--sea); }
  </style>
</head>
<body>
  <main class="wrap">
    <p class="kicker">The Beaches Beat</p>
    <h1>Local news for the Beaches, once a week.</h1>
    <p class="lead">The stories, tides, and happenings that matter to our stretch of coast — in one short, reliable weekly email.</p>
    <span class="badge">Subscriptions opening soon</span>
    <footer>
      The Beaches Beat &middot; a local newsletter.<br />
      Contact: <a href="mailto:hello@thebeachesbeat.com">hello@thebeachesbeat.com</a>
    </footer>
  </main>
</body>
</html>
